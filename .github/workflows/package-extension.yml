name: Package Chrome Extension

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production extension
        run: npm run build

      - name: Create ZIP for Chrome Web Store
        run: |
          cd dist
          zip -r ../vpilot-${{ github.ref_name }}.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpilot-${{ github.ref_name }}
          path: extension/vpilot-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: extension/vpilot-${{ github.ref_name }}.zip
          generate_release_notes: true
